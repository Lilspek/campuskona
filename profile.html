<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Profile | CampusKona</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header style="background: #800000; color: white; padding: 30px 20px; text-align: center;">
        <a href="index.html" style="color: white; position: absolute; left: 20px; text-decoration: none;">⬅ Back</a>
        <div id="profile-info">
            <h2 id="prof-name">Loading...</h2>
            <p id="prof-verified"></p>
            <div style="display: flex; justify-content: center; gap: 20px; margin-top: 15px;">
                <span>Items: <b id="count-listed">0</b></span>
                <span>Sold: <b id="count-sold">0</b></span>
            </div>
            <class="profile-header">
    <div class="profile-pic-container">
        <img id="display-profile-pic" src="default-avatar.png" alt="Profile Picture" class="profile-img">
        <input type="file" id="upload-pic" style="display:none;" accept="image/*">
        <label for="upload-pic" id="edit-pic-btn" class="edit-overlay" style="display:none;">Edit</label>
    </div>
    <h2 id="prof-name">Loading...</h2>
    <p id="prof-stats"></p>
        </div>
    </header>

    <main id="seller-items" style="padding: 20px;">
        <h3 style="margin-bottom: 15px;">Seller's Listings</h3>
        <div id="items-container">
    <div class="card skeleton-card">
        <div class="skeleton skeleton-img"></div>
        <div class="skeleton skeleton-text"></div>
        <div class="skeleton skeleton-price"></div>
    </div>
    <div class="card skeleton-card">
        <div class="skeleton skeleton-img"></div>
        <div class="skeleton skeleton-text"></div>
        <div class="skeleton skeleton-price"></div>
    </div>
</div>
    </main>

    <script type="module">
       import { db, doc, getDoc, collection, setDoc, auth, getDocs, query, where } from './firebase-config.js';
// MUST import this here if it's not in your firebase-config.js
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 1. Get the Seller ID from the URL
const urlParams = new URLSearchParams(window.location.search);
const sellerId = urlParams.get('id');

if (!sellerId) {
    window.location.href = 'index.html';
}

// 2. Handle Authentication and Profile Picture Editing
onAuthStateChanged(auth, async (user) => {
    // FIX: Check if the logged-in user matches the profile being viewed
    if (user && user.uid === sellerId) {
        const editBtn = document.getElementById('edit-pic-btn');
        if (editBtn) editBtn.style.display = 'block';
        
        const uploadInput = document.getElementById('upload-pic');
        if (uploadInput) {
            uploadInput.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    const base64Pic = reader.result;
                    
                    try {
                        await setDoc(doc(db, "users", user.uid), {
                            profilePic: base64Pic,
                            displayName: user.displayName || "KNUST Student"
                        }, { merge: true });

                        document.getElementById('display-profile-pic').src = base64Pic;
                        alert("Profile picture updated!");
                    } catch (error) {
                        console.error("Upload failed:", error);
                    }
                };
            });
        }
    }
});

// 3. Load Profile Data and Items
async function loadProfile() {
    const loader = document.getElementById('loader-container');
    const container = document.getElementById('items-container');
    
    try {
        // A. Get Seller Info (Name, Verification, and Profile Picture)
        const userSnap = await getDoc(doc(db, "users", sellerId));
        if (userSnap.exists()) {
            const data = userSnap.data();
            document.getElementById('prof-name').innerText = data.name || data.displayName || "Anonymous";
            
            // Set profile picture if it exists, otherwise use fallback
            if (data.profilePic) {
                document.getElementById('display-profile-pic').src = data.profilePic;
            } else {
                document.getElementById('display-profile-pic').src = `https://ui-avatars.com/api/?name=${data.name || 'User'}&background=800000&color=fff`;
            }

            if (data.isVerified) {
                const verifiedTag = document.getElementById('prof-verified');
                if (verifiedTag) verifiedTag.innerHTML = "✅ Verified KNUST Student";
            }
        }

        // B. Query only items belonging to this seller
        const q = query(collection(db, "items"), where("userId", "==", sellerId));
        const querySnapshot = await getDocs(q);

        // C. Update the Counter
        const itemCount = querySnapshot.size;
        const countDisplay = document.getElementById('count-listed');
        if (countDisplay) countDisplay.innerText = itemCount;

        container.innerHTML = '';

        if (itemCount === 0) {
            container.innerHTML = '<p style="text-align:center; color:#777; grid-column: 1/-1;">This seller has no active listings.</p>';
        } else {
            // Re-use your display logic here to show the cards
            querySnapshot.forEach((doc) => {
                const item = doc.data();
                container.innerHTML += `
                    <div class="card">
                        <img src="${item.image}" class="card-img">
                        <div class="card-body">
                            <h3>${item.title}</h3>
                            <p class="price">GHS ${item.price}</p>
                        </div>
                    </div>`;
            });
        }

        if (loader) loader.classList.add('hidden');

    } catch (error) {
        console.error("Error loading profile:", error);
        if (loader) loader.innerHTML = "<p>Error loading data. Please refresh.</p>";
    }
}

// Call the function
loadProfile();
    </script>
</body>

</html>
