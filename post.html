<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusKona | KNUST Marketplace</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#800000">
</head>
<body>
    <header>
        <h1><a href="index.html" style="color:white; text-decoration:none;">⬅ Back</a> Post an Item</h1>
    </header>

    <main>
        <form id="post-form">
            <label for="title">Item Name</label>
            <input type="text" id="title" required placeholder="e.g., Engineering Drawing Board">

            <label>Price (GHS)</label>
            <input type="number" id="price" required placeholder="e.g., 150">
                <div class="input-group">
    <label>Full Name</label>
    <input type="text" id="seller-name" placeholder="Enter your name" required>
</div>

<div class="input-group">
    <label>KNUST Student Email</label>
    <input type="email" id="seller-email" placeholder="username@st.knust.edu.gh" required>
    <small>Use your student email for a "Verified" badge! ✅</small>
</div>
            <label for="category">Category</label>
<select id="category" required>
    <option value="General">General</option>
    <option value="Electronics">Electronics</option>
    <option value="Books">Books/Stationery</option>
    <option value="Fashion">Fashion & Beauty</option>
    <option value="Hostel supplies">Hostel Supplies</option>
</select>

            <label>Description</label>
            <textarea id="description" required placeholder="Condition, location on campus, etc."></textarea>

            <label>WhatsApp Number</label>
            <input type="tel" id="whatsapp" required placeholder="e.g., 233550000000 (include 233)">

            <label for="image">Item Photo</label>
            <input type="file" id="image" accept="image/*">

            <button type="button" id="post-btn" class="btn btn-full">Post Item</button>
        </form>
    </main>

    <script type="module">
    import { db, collection, addDoc } from './firebase-config.js';

    const postBtn = document.getElementById('post-btn');

    postBtn.addEventListener('click', async () => {
        // 1. Capture all input values
        const file = document.getElementById('image').files[0];
        const title = document.getElementById('title').value;
        const price = document.getElementById('price').value;
        const description = document.getElementById('description').value;
        const whatsapp = document.getElementById('whatsapp').value;
        const category = document.getElementById('category').value;
        const sellerName = document.getElementById('seller-name').value;
        const email = document.getElementById('seller-email').value;

        // 2. Validation
        if (!file || !title || !price || !sellerName || !email) {
            alert("Please fill in all fields and select a photo!");
            return;
        }

        // 3. Logic for Verification
        const isVerified = email.toLowerCase().endsWith('@st.knust.edu.gh');

        postBtn.innerText = "Uploading Image...";
        postBtn.disabled = true;

        try {
            // 4. Upload to ImgBB
            const formData = new FormData();
            formData.append('image', file);
            const imgbbKey = '1edc53616bf1d8a925f06f0d3af6df89'; 
            
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, {
                method: 'POST',
                body: formData
            });

            const imageData = await response.json();
            if (!imageData.success) throw new Error("Image Upload Failed");

            const imageUrl = imageData.data.display_url;

            // 5. Save EVERYTHING to Firebase
            postBtn.innerText = "Saving Item...";
            await addDoc(collection(db, "items"), {
                title: title,
                price: price,
                description: description,
                whatsapp: whatsapp,
                category: category,
                image: imageUrl,
                sellerName: sellerName, // NOW SAVING
                isVerified: isVerified, // NOW SAVING
                timestamp: new Date()
            });

            alert("Posted successfully!");
            window.location.href = "index.html";
        } catch (error) {
            console.error("Error:", error);
            alert("Upload Error: " + error.message);
            postBtn.innerText = "Post Item";
            postBtn.disabled = false;
        }
    });
</script>
