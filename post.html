    <main>
        <form id="post-form">
            <label for="title">Item Name</label>
            <input type="text" id="title" required placeholder="e.g., Engineering Drawing Board">

            <label>Price (GHS)</label>
            <input type="number" id="price" required placeholder="e.g., 150">
                <div class="input-group">
    <label>Full Name</label>
    <input type="text" id="seller-name" placeholder="Enter your name" required>
</div>

<div class="input-group">
    <label>KNUST Student Email</label>
    <input type="email" id="seller-email" placeholder="username@st.knust.edu.gh" required>
    <small>Use your student email for a "Verified" badge! ✅</small>
</div>
            <label for="category">Category</label>
<select id="category" required>
    <option value="General">General</option>
    <option value="Electronics">Electronics</option>
    <option value="Books">Books/Stationery</option>
    <option value="Fashion">Fashion & Beauty</option>
    <option value="Hostel supplies">Hostel Supplies</option>
</select>

            <label>Description</label>
            <textarea id="description" required placeholder="Condition, location on campus, etc."></textarea>

            <label>WhatsApp Number</label>
            <input type="tel" id="whatsapp" required placeholder="e.g., 233550000000 (include 233)">

            <label for="image">Item Photo</label>
            <input type="file" id="image" accept="image/*">

            <button type="button" id="post-btn" class="btn btn-full">Post Item</button>
        </form>
    </main>

    <script type="module">
    import { auth, db, collection, addDoc, doc, getDoc } from './firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    let currentUserData = null;

    // 1. Check if user is logged in and get their profile
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            alert("Please login first!");
            window.location.href = "login.html";
        } else {
            // Fetch the user's name and verification status from Firestore
            const userRef = doc(db, "users", user.uid);
            const userSnap = await getDoc(userRef);
            if (userSnap.exists()) {
                currentUserData = userSnap.data();
                console.log("Welcome,", currentUserData.name);
            }
        }
    });

    const postBtn = document.getElementById('post-btn');

    postBtn.addEventListener('click', async () => {

        const price = document.getElementById('price').value;
        const description = document.getElementById('description').value;
        const whatsapp = document.getElementById('whatsapp').value;
        const category = document.getElementById('category').value;
