<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Item | CampusKona</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1><a href="index.html" style="color:white; text-decoration:none;">⬅ Back</a> Post an Item</h1>
    </header>

    <main>
        <form id="post-form">
            <label for="title">Item Name</label>
            <input type="text" id="title" required placeholder="e.g., Engineering Drawing Board">

            <label>Price (GHS)</label>
            <input type="number" id="price" required placeholder="e.g., 150">

            <label for="category">Category</label>
<select id="category" required>
    <option value="General">General</option>
    <option value="Electronics">Electronics</option>
    <option value="Books">Books/Stationery</option>
    <option value="Fashion">Fashion & Beauty</option>
    <option value="Hostel supplies">Hostel Supplies</option>
</select>

            <label>Description</label>
            <textarea id="description" required placeholder="Condition, location on campus, etc."></textarea>

            <label>WhatsApp Number</label>
            <input type="tel" id="whatsapp" required placeholder="e.g., 233550000000 (include 233)">

            <label for="image">Item Photo</label>
            <input type="file" id="image" accept="image/*">

            <button type="button" id="post-btn" class="btn btn-full">Post Item</button>
        </form>
    </main>

    <script type="module">
    import { db, collection, addDoc } from './firebase-config.js';

    const postBtn = document.getElementById('post-btn');

    postBtn.addEventListener('click', async () => {
        const file = document.getElementById('image').files[0];
        const title = document.getElementById('title').value;
        const price = document.getElementById('price').value;
        const description = document.getElementById('description').value;
        const whatsapp = document.getElementById('whatsapp').value;
        // Add this line inside your click listener
        const category = document.getElementById('category').value;

        if (!file || !title || !price) {
            alert("Please fill in the title, price, and select a photo!");
            return;
        }

        postBtn.innerText = "Uploading Image...";
        postBtn.disabled = true;

        try {
            // 1. Prepare the image for ImgBB
            const formData = new FormData();
            formData.append('image', file);
            
            const imgbbKey = '1edc53616bf1d8a925f06f0d3af6df89'; 
            
            // 2. Upload to ImgBB
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbKey}`, {
                method: 'POST',
                body: formData
            });

            const imageData = await response.json();

            // CHECK IF UPLOAD FAILED
            if (!imageData.success) {
                throw new Error(imageData.error.message || "ImgBB Upload Failed");
            }

            const imageUrl = imageData.data.display_url;
            console.log("Image Link Created:", imageUrl);

            // 3. Save to Firebase
            postBtn.innerText = "Saving Item...";
            // Then add it to your addDoc object
            await addDoc(collection(db, "items"), {
                title: title,
                price: price,
                description: description,
                whatsapp: whatsapp,
                category: category, // SAVE THE CATEGORY
                image: imageUrl,
                timestamp: new Date()
            });
            alert("Posted successfully with image!");
            window.location.href = "index.html";
        } catch (error) {
            console.error("DETAILED ERROR:", error);
            alert("Upload Error: " + error.message); // This will now tell you the REAL problem
            postBtn.innerText = "Post Item";
            postBtn.disabled = false;
        }
    });
</script>
