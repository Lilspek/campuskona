<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post an Item | CampusKona</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="back-header">
        <a href="index.html">← Back</a>
        <h2>Post an Item</h2>
    </header>

    <main class="form-container">
        <form id="post-form">
            <div class="form-group">
                <label>Item Name</label>
                <input type="text" id="title" placeholder="e.g., Engineering Drawing" required>
            </div>

            <div class="form-group">
                <label>Price (GHS)</label>
                <input type="number" id="price" placeholder="e.g., 150" required>
            </div>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="sellerName" placeholder="Enter your name" required>
            </div>

            <div class="form-group">
                <label>Category</label>
                <select id="category">
                    <option value="General">General</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Books">Books</option>
                    <option value="Hostel">Hostel</option>
                    <option value="Fashion & Beauty">Fashion & Beauty</option>
                </select>
            </div>

            <div class="form-group">
                <label>WhatsApp Number</label>
                <input type="text" id="whatsapp" placeholder="e.g., 233550000000" required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea id="description" placeholder="Condition, location on campus, etc."></textarea>
            </div>

            <div class="form-group">
                <label>Item Photo</label>
                <div id="image-preview"></div>
                <input type="file" id="image" accept="image/*" required>
            </div>

            <button type="submit" class="post-btn" id="submit-btn">Post Item</button>
        </form>
    </main>

    <script type="module">
        import { db, collection, addDoc, auth } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
            } else {
                alert("Please login first!");
                window.location.href = "login.html";
            }
        });

        const postForm = document.getElementById('post-form');
        const submitBtn = document.getElementById('submit-btn');

        postForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!currentUser) return alert("You must be logged in!");

            submitBtn.disabled = true;
            submitBtn.innerText = "Uploading...";

            const title = document.getElementById('title').value;
            const price = document.getElementById('price').value;
            const sellerName = document.getElementById('sellerName').value;
            const category = document.getElementById('category').value;
            const whatsapp = document.getElementById('whatsapp').value;
            const description = document.getElementById('description').value;
            const imageFile = document.getElementById('image').files[0];

            // Convert image to Base64 (simplest way for your current setup)
            const reader = new FileReader();
            reader.readAsDataURL(imageFile);
            reader.onload = async () => {
                const base64Image = reader.result;

                try {
                    await addDoc(collection(db, "items"), {
                        title,
                        price: parseFloat(price),
                        sellerName,
                        category,
                        whatsapp,
                        description,
                        image: base64Image,
                        userId: currentUser.uid,
                        timestamp: new Date(),
                        status: 'active'
                    });

                    alert("Item posted successfully!");
                    window.location.href = "index.html";
                } catch (error) {
                    console.error("Error adding document: ", error);
                    alert("Error posting item. Try again.");
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Post Item";
                }
            };
        });
    </script>
</body>
</html>
