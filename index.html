<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusKona | KNUST Marketplace</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#800000">
</head>
<body>
    <header>
        <h1>CampusKona 🛒</h1>
        <p>Buy & Sell for KNUST Students</p>
    </header>

    <div class="search-container">
        <input type="text" id="search-input" placeholder="Search for items..." onkeyup="searchItems()">
        
        <select id="sort-price" onchange="sortItems()" title="Sort items by price or date" aria-label="Sort items">
            <option value="newest">Newest First</option>
            <option value="low">Price: Low to High</option>
            <option value="high">Price: High to Low</option>
        </select>
    </div>

    <div class="filter-bar">
        <button onclick="filterItems('All')">All</button>
        <button onclick="filterItems('General')">General</button>
        <button onclick="filterItems('Electronics')">Electronics</button>
        <button onclick="filterItems('Books')">Books</button>
        <button onclick="filterItems('Hostel')">Hostel</button>
        <button onclick="filterItems('Fashion & Beauty')">Fashion</button>
    </div>

    <main id="items-container">
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
        <div class="skeleton skeleton-card"></div>
    </main>

    <a href="post.html" class="fab">+</a>

<script type="module">
    import { db, collection, getDocs, deleteDoc, doc } from './firebase-config.js';

    let allItems = []; 

    async function loadItems() {
        try {
            const querySnapshot = await getDocs(collection(db, "items"));
            allItems = querySnapshot.docs.map(doc => ({
                id: doc.id,
                ...doc.data()
            })); 
            displayItems(allItems); 
        } catch (error) {
            console.error("Error loading items: ", error);
            document.getElementById('items-container').innerHTML = '<p>Error loading items.</p>';
        }
    }

    function displayItems(items) {
        const container = document.getElementById('items-container');
        container.innerHTML = ''; 
        
        if (items.length === 0) {
            container.innerHTML = '<p style="text-align:center; width:100%;">No items found.</p>';
            return;
        }

        items.forEach((item) => {
            const date = item.timestamp ? item.timestamp.toDate() : new Date();
            const timeString = timeAgo(date);
            const waLink = `https://wa.me/${item.whatsapp}?text=Hi, I saw your ${item.title} on CampusKona.`;
            
            // logic for the badge
            const verifiedBadge = item.isVerified 
                ? `<span class="verified-tag" style="background: #e1f5fe; color: #01579b; padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: bold; border: 1px solid #01579b;">✅ Verified Student</span>` 
                : '';

            const cardHTML = `
                <div class="card">
                    <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
                        <span class="category-tag">${item.category || 'General'}</span>
                        ${verifiedBadge} 
                    </div>
                    ${item.image ? `<img src="${item.image}" class="card-img">` : ''}
                    <div class="card-body">
                        <div style="display: flex; justify-content: space-between;">
                            <h3>${item.title}</h3>
                            <span style="font-size: 0.7rem; color: #666;">${timeString}</span>
                        </div>
                        <p class="price">GHS ${item.price}</p>
                        <p style="font-size: 0.8rem; color: #555; margin-bottom: 5px;">👤 Seller: ${item.sellerName || 'Anonymous'}</p>
                        <p class="desc">${item.description}</p>
                        
                        <div class="card-actions">
                            <a href="${waLink}" target="_blank" class="btn">Message Seller</a>
                            <button onclick="markAsSold('${item.id}')" class="sold-btn">Sold</button>
                        </div>
                        
                        <div class="admin-actions" style="margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px;">
                             <span class="report-btn" onclick="reportItem('${item.id}', '${item.title}')" style="cursor:pointer; color: #800000; font-size: 0.8rem;">🚩 Report Post</span>
                        </div>
                    </div>
                </div>
            `;
            container.innerHTML += cardHTML;
        });
    }

    // UTILITY FUNCTIONS
    function timeAgo(date) {
        const seconds = Math.floor((new Date() - date) / 1000);
        let interval = Math.floor(seconds / 31536000);
        if (interval > 1) return interval + "y ago";
        interval = Math.floor(seconds / 2592000);
        if (interval > 1) return interval + "mo ago";
        interval = Math.floor(seconds / 86400);
        if (interval > 1) return interval + "d ago";
        interval = Math.floor(seconds / 3600);
        if (interval > 1) return interval + "h ago";
        interval = Math.floor(seconds / 60);
        if (interval > 1) return interval + "m ago";
        return "Just now";
    }

    window.reportItem = (id, title) => {
        const adminPhone = "+233538736081"; 
        const msg = `Hi Admin, I want to report this item: ${title} (ID: ${id}).`;
        window.open(`https://wa.me/${adminPhone}?text=${encodeURIComponent(msg)}`);
    };

    window.filterItems = (category) => {
        if (category === 'All') {
            displayItems(allItems);
        } else {
            const filtered = allItems.filter(item => item.category === category);
            displayItems(filtered);
        }
    };

    window.searchItems = () => {
        const searchTerm = document.getElementById('search-input').value.toLowerCase();
        const filtered = allItems.filter(item => {
            return item.title.toLowerCase().includes(searchTerm) || 
                   item.description.toLowerCase().includes(searchTerm);
        });
        displayItems(filtered);
    };

    window.sortItems = () => {
        const sortType = document.getElementById('sort-price').value;
        let sortedItems = [...allItems]; 
        if (sortType === 'low') sortedItems.sort((a, b) => a.price - b.price);
        else if (sortType === 'high') sortedItems.sort((a, b) => b.price - a.price);
        else {
            sortedItems.sort((a, b) => {
                const dateA = a.timestamp ? a.timestamp.toDate() : new Date();
                const dateB = b.timestamp ? b.timestamp.toDate() : new Date();
                return dateB - dateA;
            });
        }
        displayItems(sortedItems);
    };

    window.markAsSold = async (itemId) => {
        const password = prompt("Enter Admin Password:");
        if (password === '@Lilspek') { 
            if (confirm("Delete this item?")) {
                try {
                    await deleteDoc(doc(db, "items", itemId));
                    alert("Removed!");
                    loadItems(); 
                } catch (e) { alert("Error: " + e.message); }
            }
        } else { alert("Incorrect password!"); }
    };

    loadItems();
</script>
</body>
</html>
